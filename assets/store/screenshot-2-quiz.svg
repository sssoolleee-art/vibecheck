<svg width="636" height="1048" viewBox="0 0 636 1048" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="progGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>

  <rect width="636" height="1048" fill="#FFFFFF"/>

  <!-- 헤더 -->
  <rect x="40" y="80" width="52" height="52" rx="14" fill="#F9FAFB"/>
  <path d="M34 106 L28 106" stroke="#1F2937" stroke-width="2" stroke-linecap="round" transform="translate(26, 0)"/>
  <polyline points="54,96 44,106 54,116" fill="none" stroke="#1F2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="318" y="114" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="18" font-weight="700" fill="#1F2937" text-anchor="middle">3 <tspan fill="#D1D5DB">/ 8</tspan></text>

  <!-- 프로그레스 바 -->
  <rect x="40" y="154" width="556" height="6" rx="3" fill="#F3F4F6"/>
  <rect x="40" y="154" width="208" height="6" rx="3" fill="url(#progGrad)"/>

  <!-- 질문 섹션 -->
  <rect x="40" y="210" width="68" height="68" rx="18" fill="#F5F3FF"/>
  <text x="74" y="254" font-family="sans-serif" font-size="36" text-anchor="middle">🎯</text>

  <text x="40" y="320" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="800" fill="#111827" letter-spacing="-0.5">중요한 결정 앞에서</text>
  <text x="40" y="358" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="800" fill="#111827" letter-spacing="-0.5">나는?</text>

  <!-- 선택지 -->
  <!-- A - 선택됨 -->
  <rect x="40" y="420" width="556" height="78" rx="16" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2.5"/>
  <rect x="64" y="444" width="30" height="30" rx="8" fill="#7C3AED"/>
  <text x="79" y="464" font-family="sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">A</text>
  <text x="112" y="456" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="500" fill="#1F2937">빠르게 판단하고 실행.</text>
  <text x="112" y="477" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="500" fill="#1F2937">고민이 길면 답 없다</text>
  <text x="572" y="464" font-family="sans-serif" font-size="18" font-weight="700" fill="#7C3AED" text-anchor="middle">✓</text>

  <!-- B -->
  <rect x="40" y="516" width="556" height="78" rx="16" fill="#F9FAFB" stroke="transparent" stroke-width="2"/>
  <rect x="64" y="540" width="30" height="30" rx="8" fill="#FFFFFF"/>
  <text x="79" y="560" font-family="sans-serif" font-size="13" font-weight="700" fill="#9CA3AF" text-anchor="middle">B</text>
  <text x="112" y="552" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="500" fill="#1F2937">주변 상황과 사람들 반응</text>
  <text x="112" y="573" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="500" fill="#1F2937">보면서 결정한다</text>

  <!-- C -->
  <rect x="40" y="612" width="556" height="78" rx="16" fill="#F9FAFB"/>
  <rect x="64" y="636" width="30" height="30" rx="8" fill="#FFFFFF"/>
  <text x="79" y="656" font-family="sans-serif" font-size="13" font-weight="700" fill="#9CA3AF" text-anchor="middle">C</text>
  <text x="112" y="648" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="500" fill="#1F2937">직관을 믿는다.</text>
  <text x="112" y="669" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="500" fill="#1F2937">끌리는 쪽으로 간다</text>

  <!-- D -->
  <rect x="40" y="708" width="556" height="78" rx="16" fill="#F9FAFB"/>
  <rect x="64" y="732" width="30" height="30" rx="8" fill="#FFFFFF"/>
  <text x="79" y="752" font-family="sans-serif" font-size="13" font-weight="700" fill="#9CA3AF" text-anchor="middle">D</text>
  <text x="112" y="744" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="500" fill="#1F2937">시간이 걸려도 깊이</text>
  <text x="112" y="765" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="500" fill="#1F2937">생각하고 결정한다</text>
