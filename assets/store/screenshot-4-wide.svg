<svg width="1054" height="741" viewBox="0 0 1054 741" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <filter id="blob"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>

  <rect width="1054" height="741" fill="#0C0A1A"/>

  <!-- 배경 블롭 -->
  <ellipse cx="250" cy="300" rx="280" ry="220" fill="#7C3AED" fill-opacity="0.18" filter="url(#blob)"/>
  <ellipse cx="850" cy="450" rx="250" ry="200" fill="#06B6D4" fill-opacity="0.14" filter="url(#blob)"/>

  <!-- 왼쪽 결과 카드 -->
  <rect x="60" y="80" width="380" height="580" rx="28" fill="url(#heroGrad)"/>
  <rect x="140" y="120" width="220" height="28" rx="14" fill="rgba(255,255,255,0.2)"/>
  <text x="250" y="139" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="2">MY VIBE TYPE</text>
  <text x="250" y="240" font-family="sans-serif" font-size="90" text-anchor="middle">⚡</text>
  <text x="250" y="310" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="900" fill="#FFFFFF" text-anchor="middle">스파크 바이브</text>
  <text x="250" y="350" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="18" fill="rgba(255,255,255,0.8)" text-anchor="middle">번개처럼 터지는 아이디어 메이커</text>

  <!-- 태그 -->
  <rect x="100" y="390" width="126" height="32" rx="16" fill="rgba(255,255,255,0.15)"/>
  <text x="163" y="411" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">폭발적인 창의력</text>
  <rect x="238" y="390" width="80" height="32" rx="16" fill="rgba(255,255,255,0.15)"/>
  <text x="278" y="411" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">즉흥성</text>
  <rect x="100" y="434" width="104" height="32" rx="16" fill="rgba(255,255,255,0.15)"/>
  <text x="152" y="455" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">새로운 시각</text>
  <rect x="216" y="434" width="120" height="32" rx="16" fill="rgba(255,255,255,0.15)"/>
  <text x="276" y="455" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">트렌드 감각</text>

  <!-- 버튼 -->
  <rect x="88" y="572" width="264" height="56" rx="14" fill="rgba(255,255,255,0.2)"/>
  <text x="220" y="606" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">공유하기 ⚡</text>

  <!-- 오른쪽 텍스트 -->
  <text x="520" y="180" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" letter-spacing="-1">나의 바이브,</text>
  <text x="520" y="244" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" letter-spacing="-1">지금 체크해봐</text>

  <text x="520" y="302" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="22" fill="rgba(255,255,255,0.5)">8가지 질문으로 발견하는 나만의 에너지 유형</text>

  <!-- 4가지 유형 -->
  <g transform="translate(520, 360)">
    <rect width="120" height="56" rx="14" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.4)" stroke-width="1"/>
    <text x="60" y="26" font-family="sans-serif" font-size="22" text-anchor="middle" dominant-baseline="middle">🔥</text>
    <text x="60" y="44" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="13" font-weight="600" fill="#FB923C" text-anchor="middle">파이어</text>

    <rect x="132" width="120" height="56" rx="14" fill="rgba(14,165,233,0.15)" stroke="rgba(14,165,233,0.4)" stroke-width="1"/>
    <text x="192" y="26" font-family="sans-serif" font-size="22" text-anchor="middle" dominant-baseline="middle">🌊</text>
    <text x="192" y="44" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="13" font-weight="600" fill="#38BDF8" text-anchor="middle">웨이브</text>

    <rect x="264" width="120" height="56" rx="14" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.5)" stroke-width="1"/>
    <text x="324" y="26" font-family="sans-serif" font-size="22" text-anchor="middle" dominant-baseline="middle">⚡</text>
    <text x="324" y="44" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="13" font-weight="600" fill="#A78BFA" text-anchor="middle">스파크</text>

    <rect x="396" width="120" height="56" rx="14" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
    <text x="456" y="26" font-family="sans-serif" font-size="22" text-anchor="middle" dominant-baseline="middle">🌙</text>
    <text x="456" y="44" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="13" font-weight="600" fill="#818CF8" text-anchor="middle">딥</text>
  </g>

  <!-- CTA 버튼 -->
  <rect x="520" y="470" width="474" height="66" rx="16" fill="url(#btnGrad)"/>
  <text x="757" y="510" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">바이브 체크하기</text>
</svg>
