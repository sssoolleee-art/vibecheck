<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 600px;
  height: 600px;
  background: #0D0D0D;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
}
.wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.emoji {
  font-size: 160px;
  line-height: 1;
  filter: drop-shadow(0 0 40px rgba(192,57,43,0.6));
}
.name {
  font-size: 52px;
  font-weight: 900;
  color: #FFFFFF;
  letter-spacing: -2px;
}
.sub {
  font-size: 20px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="emoji">🌑</div>
  <div class="name">욕망 지수</div>
  <div class="sub">DESIRE INDEX</div>
</div>
</body>
</html>
