<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4F1FF" />
      <stop offset="100%" style="stop-color:#EDF5FF" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED" />
      <stop offset="50%" style="stop-color:#6366F1" />
      <stop offset="100%" style="stop-color:#06B6D4" />
    </linearGradient>
    <linearGradient id="blobA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#67E8F9;stop-opacity:0.2" />
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="45" />
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="600" height="600" fill="url(#bg)" />

  <!-- 배경 블롭 -->
  <ellipse cx="160" cy="180" rx="200" ry="160" fill="#A78BFA" fill-opacity="0.2" filter="url(#soft)" />
  <ellipse cx="440" cy="420" rx="180" ry="150" fill="#67E8F9" fill-opacity="0.2" filter="url(#soft)" />

  <!-- 파형 아이콘 (pulse / waveform) -->
  <!-- 기준선 Y=255, 전체 너비 280px, 중앙 300 -->
  <polyline
    points="120,255 165,255 185,195 205,315 225,195 245,315 265,210 285,300 305,255 345,255 365,185 385,325 405,185 425,325 445,225 465,285 480,255"
    fill="none"
    stroke="url(#waveGrad)"
    stroke-width="13"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- 체크 마크 (파형 오른쪽 하단, 오버랩) -->
  <g transform="translate(390, 305)">
    <circle cx="0" cy="0" r="38" fill="#F4F1FF" stroke="url(#waveGrad)" stroke-width="3" />
    <polyline
      points="-14,2 -4,13 16,-12"
      fill="none"
      stroke="url(#waveGrad)"
      stroke-width="7"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- 텍스트 -->
  <text
    x="300" y="440"
    font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif"
    font-size="90"
    font-weight="800"
    fill="#1E1040"
    text-anchor="middle"
    letter-spacing="-4"
  >바이브체크</text>

  <text
    x="300" y="480"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="21"
    font-weight="400"
    fill="#7C3AED"
    fill-opacity="0.6"
    text-anchor="middle"
    letter-spacing="9"
  >VIBE CHECK</text>
</svg>
