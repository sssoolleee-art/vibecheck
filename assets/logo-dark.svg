<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C0A1A" />
      <stop offset="100%" style="stop-color:#080E1A" />
    </linearGradient>
    <linearGradient id="waveGrad-d" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA" />
      <stop offset="50%" style="stop-color:#818CF8" />
      <stop offset="100%" style="stop-color:#22D3EE" />
    </linearGradient>
    <filter id="soft-d">
      <feGaussianBlur stdDeviation="50" />
    </filter>
    <filter id="glow-d">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="600" height="600" fill="url(#bg-d)" />

  <!-- 배경 글로우 블롭 -->
  <ellipse cx="160" cy="180" rx="180" ry="150" fill="#7C3AED" fill-opacity="0.15" filter="url(#soft-d)" />
  <ellipse cx="440" cy="420" rx="160" ry="140" fill="#06B6D4" fill-opacity="0.12" filter="url(#soft-d)" />

  <!-- 파형 아이콘 -->
  <g filter="url(#glow-d)">
    <polyline
      points="120,255 165,255 185,195 205,315 225,195 245,315 265,210 285,300 305,255 345,255 365,185 385,325 405,185 425,325 445,225 465,285 480,255"
      fill="none"
      stroke="url(#waveGrad-d)"
      stroke-width="13"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- 체크 마크 -->
  <g transform="translate(390, 305)" filter="url(#glow-d)">
    <circle cx="0" cy="0" r="38" fill="#0C0A1A" stroke="url(#waveGrad-d)" stroke-width="3" />
    <polyline
      points="-14,2 -4,13 16,-12"
      fill="none"
      stroke="url(#waveGrad-d)"
      stroke-width="7"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- 텍스트 -->
  <text
    x="300" y="440"
    font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif"
    font-size="90"
    font-weight="800"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-4"
  >바이브체크</text>

  <text
    x="300" y="480"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="21"
    font-weight="400"
    fill="#A78BFA"
    fill-opacity="0.7"
    text-anchor="middle"
    letter-spacing="9"
  >VIBE CHECK</text>
</svg>
